ja:
  activerecord:
    models:
      user: ユーザー
      tea_product: 紅茶商品
      brand: ブランド
      purchase_location: 購入場所
      tea_product_purchase_location: 購入場所

    # =========================
    # 属性名（ラベル）
    # =========================
    attributes:

      # --------------------
      # User
      # --------------------
      user:
        name: 名前
        email: メールアドレス
        password: パスワード
        password_confirmation: パスワード（確認）

      # --------------------
      # TeaProduct
      # --------------------
      tea_product:
        name: 商品名
        status: ステータス
        tea_type: 茶葉タイプ
        caffeine_level: カフェイン
        brand: ブランド
        selected_flavor_category_id: フレーバーカテゴリ
        tea_product_purchase_locations: 購入場所

      # --------------------
      # Brand
      # --------------------
      brand:
        user: 投稿者
        approved_by: 承認者
        name_ja: 日本語名
        name_en: 英語名
        country: 国名
        description: 説明
        approved_at: 承認日時
        status: ステータス

      # --------------------
      # PurchaseLocation
      # --------------------
      purchase_location:
        name: 場所名
        location_type: 種別

      tea_product_purchase_location:
        purchase_location: 購入場所
        purchase_location_id: 購入場所

    # =========================
    # enum 翻訳
    # =========================
    enums:

      tea_product:
        status:
          draft: 下書き
          pending: 承認待ち
          rejected: 却下
          published: 公開中

        tea_type:
          black: ブラックティー（紅茶）
          green: グリーンティー（緑茶）
          oolong: ウーロンティー（烏龍茶）
          white: ホワイトティー（白茶）
          herbal: ハーブティー
        caffeine_level:
          caffeinated: カフェインあり
          non_caffeinated: カフェインなし
          decaffeinated: デカフェ

      brand:
        status:
          draft: 下書き
          pending: 承認待ち
          rejected: 却下
          published: 公開中

      purchase_location:
        location_type:
          supermarket: スーパーマーケット
          convenience_store: コンビニエンスストア
          department_store: 百貨店（高島屋・三越）
          tea_specialty_store: 紅茶専門店
          specialty_store: 専門店（カルディ・成城石井など）
          online_shop: ネット通販
          other: その他

      tea_product_submission:
        status:
          draft: 下書き
          pending: 承認待ち
          rejected: 却下
          approved: 承認

        tea_type:
          black: ブラックティー（紅茶）
          green: グリーンティー（緑茶）
          oolong: ウーロンティー（烏龍茶）
          white: ホワイトティー（白茶）
          herbal: ハーブティー
        caffeine_level:
          caffeinated: カフェインあり
          non_caffeinated: カフェインなし
          decaffeinated: デカフェ

      tea_product_submission_purchase_location:
        location_type:
          supermarket: スーパーマーケット
          convenience_store: コンビニエンスストア
          department_store: 百貨店（高島屋・三越）
          tea_specialty_store: 紅茶専門店
          specialty_store: 専門店（カルディ・成城石井など）
          online_shop: ネット通販
          other: その他

    # =========================
    # エラーメッセージ
    # =========================
    errors:
      models:
        tea_product:
          attributes:
            name:
              blank: "商品名を入力してください"
        tea_product_purchase_location:
          attributes:
            purchase_location_id:
              blank: "購入場所を入力してください"
        purchase_location:
          attributes:
            name:
              blank: "店舗名を入力してください"
              too_short: "店舗名は%{count}文字以上で入力してください"
            location_type:
              blank: "購入場所の種類を選択してください"
  errors:
    messages:
      blank: を入力してください
      too_short: "%{count}文字以上で入力してください"